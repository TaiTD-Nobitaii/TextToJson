<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz → JSON</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;
    --panel:#161922;
    --panel2:#1b1f2b;
    --line:#272c3a;
    --line-soft:#21252f;
    --ink:#e7e9f0;
    --ink-dim:#9398ab;
    --ink-faint:#5d6175;
    --amber:#e8a23d;
    --amber-soft:#3a2f1c;
    --teal:#3fc9a8;
    --teal-soft:#163029;
    --red:#e8694a;
    --red-soft:#3a2218;
    --mono:'JetBrains Mono','Fira Code','SF Mono',Consolas,monospace;
    --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --radius:6px;
  }
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;font-size:14.5px;line-height:1.6}

  header{
    background:var(--panel);border-bottom:1px solid var(--line);
    padding:14px 20px;display:flex;align-items:center;gap:14px;
  }
  header .mark{
    width:30px;height:30px;border-radius:7px;background:linear-gradient(155deg,var(--amber),#c97a1f);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;
    font-size:13px;color:#1a1206;flex-shrink:0;letter-spacing:-0.5px;
  }
  header .title{display:flex;flex-direction:column;gap:1px}
  header h1{font-size:15px;font-weight:600;letter-spacing:-0.2px}
  header .sub{font-size:11.5px;color:var(--ink-faint);font-family:var(--mono)}
  header .spacer{flex:1}
  header .badges{display:flex;gap:6px}
  .pill{
    font-size:11px;color:var(--ink-dim);background:var(--panel2);padding:4px 10px;
    border-radius:20px;border:1px solid var(--line);font-family:var(--mono);white-space:nowrap;
  }

  .layout{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 59px)}
  .panel{display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
  .panel + .panel{border-left:1px solid var(--line)}

  .panel-header{
    padding:11px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;
  }
  .panel-header .label{
    font-size:11.5px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;
    letter-spacing:1px;font-family:var(--mono);display:flex;align-items:center;gap:7px;
  }
  .panel-header .label .dot{width:6px;height:6px;border-radius:50%}
  .dot.in{background:var(--ink-faint)}
  .dot.out{background:var(--teal)}
  .panel-header .actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

  .config-bar{
    padding:10px 18px;background:var(--amber-soft);border-bottom:1px solid #4a3a22;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;flex-shrink:0;
  }
  .config-field{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#e3c894}
  .config-field input[type=text]{
    border:1px solid #5a4626;border-radius:var(--radius);padding:5px 9px;font-size:12.5px;
    width:120px;background:#241a0c;color:var(--ink);font-family:var(--mono);
  }
  .config-field input[type=text]:focus{outline:none;border-color:var(--amber)}
  .config-field.type-field input{width:150px}
  .config-field input[type=checkbox]{accent-color:var(--amber);width:15px;height:15px;cursor:pointer}
  .config-field input[type=checkbox]:disabled{cursor:not-allowed;opacity:0.6}
  .config-field label{cursor:pointer}
  .config-field select{
    border:1px solid #5a4626;border-radius:var(--radius);padding:5px 9px;font-size:12.5px;
    background:#241a0c;color:var(--ink);font-family:var(--mono);cursor:pointer;
  }
  .config-field select:focus{outline:none;border-color:var(--amber)}
  .config-field.hidden{display:none !important}

  textarea{
    flex:1;border:none;outline:none;resize:none;padding:18px 20px;font-family:var(--mono);
    font-size:13px;line-height:1.75;background:var(--bg);color:var(--ink);tab-size:2;
  }
  textarea::placeholder{color:var(--ink-faint)}

  .output-area{
    flex:1;overflow-y:auto;padding:18px 20px;font-family:var(--mono);font-size:12.5px;
    line-height:1.75;background:var(--bg);white-space:pre-wrap;word-break:break-word;color:var(--ink);
  }
  .output-area.empty{
    display:flex;align-items:center;justify-content:center;color:var(--ink-faint);
    font-family:var(--sans);font-size:13.5px;text-align:center;gap:10px;flex-direction:column;
  }
  .output-area.empty svg{opacity:0.35}
  .output-area .empty-hint{font-size:12px;color:var(--ink-faint);max-width:280px}

  .footer-bar{
    padding:9px 18px;background:var(--panel);border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
    font-size:12px;color:var(--ink-dim);font-family:var(--mono);gap:10px;
  }

  button{
    cursor:pointer;border:1px solid var(--line);border-radius:var(--radius);padding:6px 13px;
    font-size:12.5px;font-weight:500;background:var(--panel2);color:var(--ink);
    transition:all .12s;line-height:1.4;font-family:var(--sans);display:inline-flex;
    align-items:center;gap:6px;
  }
  button:hover{background:#23283a;border-color:#34394a}
  button:active{transform:scale(0.97)}
  button.primary{background:var(--amber);color:#1a1206;border-color:var(--amber);font-weight:600}
  button.primary:hover{background:#f0ad52}
  button.success{background:var(--teal);color:#06231b;border-color:var(--teal);font-weight:600}
  button.success:hover{background:#54dcb9}
  button.danger{background:transparent;color:var(--red);border-color:#5a3326}
  button.danger:hover{background:var(--red-soft)}
  button.ghost{background:transparent}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;font-family:var(--mono)}
  .badge.ok{background:var(--teal-soft);color:var(--teal)}
  .badge.warn{background:var(--amber-soft);color:var(--amber)}
  .badge.err{background:var(--red-soft);color:var(--red)}
  .badge.fmt{background:#1c2a3a;color:#7fb8e8}

  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--panel2);color:var(--ink);
    padding:11px 18px;border-radius:var(--radius);font-size:13px;opacity:0;
    transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:99;
    border:1px solid var(--line);box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  .toast.show{opacity:1;transform:translateY(0)}

  .json-key{color:#7fb8e8}
  .json-str{color:var(--teal)}
  .json-num{color:var(--amber)}
  .json-bool{color:var(--red)}
  .json-null{color:var(--ink-faint)}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#34394a}
  ::-webkit-scrollbar-track{background:transparent}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr;grid-template-rows:1fr 1fr;height:auto;min-height:calc(100vh - 59px)}
    .panel{min-height:50vh}
    .panel + .panel{border-left:none;border-top:1px solid var(--line)}
    header .sub{display:none}
  }
</style>
</head>
<body>

<header>
  <div class="mark">{ }</div>
  <div class="title">
    <h1>Về Đây Anh Cứu</h1>
    <span class="sub">đã thêm: nhận diện định dạng "--- Card N ---" (Q: / A-E / A:)</span>
  </div>
  <div class="spacer"></div>
</header>

<div class="layout">
  <div class="panel">
    <div class="panel-header">
      <span class="label"><span class="dot in"></span>Văn bản đầu vào</span>
      <div class="actions">
        <button class="ghost" onclick="loadSample('basic')">Mẫu Ngân Hàng Câu Hỏi</button>
        <button class="ghost" onclick="loadSample('card')">Mẫu FlashCardVip</button>
        <button class="danger" onclick="clearInput()">Xoá</button>
        <button class="primary" onclick="convert()">▶ Chuyển đổi</button>
      </div>
    </div>

    <div class="config-bar">
      <div class="config-field">
        <label for="formatMode">Định dạng</label>
        <select id="formatMode">
          <option value="auto" selected>Tự động nhận diện</option>
          <option value="standard">Ngân hàng câu hỏi</option>
          <option value="card">FlashCardVip</option>
        </select>
      </div>
      <div class="config-field" id="tagsField">
        <label for="defaultTags">Tags</label>
        <input type="text" id="defaultTags" value="MMA301" placeholder="tag1, tag2">
      </div>
      <div class="config-field type-field" id="typeField">
        <label for="defaultType">Type</label>
        <input type="text" id="defaultType" value="multiple_choice">
      </div>
      <div class="config-field">
        <input type="checkbox" id="flashcard" checked>
        <label for="flashcard">isAvailableFlashcard</label>
      </div>
    </div>

    <textarea id="inputText" placeholder="Dán văn bản đề thi vào đây..." spellcheck="false"></textarea>

    <div class="footer-bar">
      <span id="inputStats">Chưa có nội dung</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="label"><span class="dot out"></span>JSON đầu ra</span>
      <div class="actions">
        <span id="resultBadge"></span>
        <button class="ghost" onclick="copyJSON()">📋 Sao chép</button>
        <button class="success" onclick="downloadJSON()">⬇ Tải JSON</button>
      </div>
    </div>
    <div id="outputArea" class="output-area empty">
      <svg width="34" height="34" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.3"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/></svg>
      <div>Nhập văn bản và nhấn <strong>▶ Chuyển đổi</strong></div>
      <div class="empty-hint">Kết quả JSON sẽ hiện ở đây, có tô màu cú pháp để dễ kiểm tra.</div>
    </div>
    <div class="footer-bar">
      <span id="outputStats">—</span>
      <span id="parseInfo"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let parsedJSON = null;
const inputEl = document.getElementById('inputText');
const outputEl = document.getElementById('outputArea');

inputEl.addEventListener('input', updateInputStats);

function updateConfigVisibility() {
  const mode = document.getElementById('formatMode').value;
  const isCardMode = mode === 'card';
  document.getElementById('tagsField').classList.toggle('hidden', isCardMode);
  document.getElementById('typeField').classList.toggle('hidden', isCardMode);

  const flashcardEl = document.getElementById('flashcard');
  if (isCardMode) {
    flashcardEl.checked = false;
    flashcardEl.disabled = true;
  } else {
    flashcardEl.disabled = false;
  }
}

document.getElementById('formatMode').addEventListener('change', updateConfigVisibility);

function updateInputStats() {
  const t = inputEl.value.trim();
  if (!t) { document.getElementById('inputStats').textContent = 'Chưa có nội dung'; return; }
  const lines = t.split('\n').length;
  const chars = t.length;
  const roughStandard = (t.match(/Câu\s+\d+/gi) || []).length;
  const roughCard = (t.match(/---\s*Card\s+\d+\s*---/gi) || []).length;
  const rough = roughCard > 0 ? roughCard : roughStandard;
  const codeBlocks = (t.match(/```/g) || []).length / 2;
  document.getElementById('inputStats').textContent =
    `${lines} dòng · ${chars} ký tự${rough ? ` · ~${rough} câu` : ''}${codeBlocks >= 1 ? ` · ${Math.floor(codeBlocks)} code block` : ''}`;
}

function clearInput() {
  inputEl.value = '';
  outputEl.className = 'output-area empty';
  outputEl.innerHTML = '<svg width="34" height="34" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.3"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/></svg><div>Nhập văn bản và nhấn <strong>▶ Chuyển đổi</strong></div><div class="empty-hint">Kết quả JSON sẽ hiện ở đây, có tô màu cú pháp để dễ kiểm tra.</div>';
  parsedJSON = null;
  document.getElementById('resultBadge').innerHTML = '';
  document.getElementById('outputStats').textContent = '—';
  document.getElementById('parseInfo').textContent = '';
  updateInputStats();
}

function showToast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function copyJSON() {
  if (!parsedJSON) { showToast('Chưa có dữ liệu để sao chép'); return; }
  navigator.clipboard.writeText(JSON.stringify(parsedJSON, null, 2))
    .then(() => showToast('✅ Đã sao chép JSON'))
    .catch(() => showToast('❌ Không thể sao chép'));
}

function downloadJSON() {
  if (!parsedJSON) { showToast('Chưa có dữ liệu để tải'); return; }
  const blob = new Blob([JSON.stringify(parsedJSON, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'questions_' + Date.now() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✅ Đã tải file JSON');
}

// ─── CORE: xử lý code blocks ────────────────────────────────────────────────

function segmentize(raw) {
  const segments = [];
  const fencedRe = /```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g;
  let lastIndex = 0;
  let match;

  while ((match = fencedRe.exec(raw)) !== null) {
    if (match.index > lastIndex) {
      segments.push({ type: 'text', content: raw.slice(lastIndex, match.index) });
    }
    const lang = match[1].trim() || 'plaintext';
    const code = match[2];
    segments.push({ type: 'code', lang: lang, content: code });
    lastIndex = fencedRe.lastIndex;
  }

  if (lastIndex < raw.length) {
    segments.push({ type: 'text', content: raw.slice(lastIndex) });
  }

  return segments;
}

function textToHTML(str) {
  str = str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  str = str.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  str = str.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return str;
}

function escapeCode(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function rawToHTML(raw) {
  if (!raw || !raw.trim()) return '';
  const segments = segmentize(raw);
  let html = '';
  for (const seg of segments) {
    if (seg.type === 'code') {
      const lang = seg.lang !== 'plaintext' ? ` class="language-${seg.lang}"` : '';
      const codeContent = seg.content.replace(/\n$/, '');
      html += `<pre><code${lang}>${escapeCode(codeContent)}</code></pre>`;
    } else {
      const lines = seg.content.split('\n');
      const parts = [];
      let buf = '';
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i];
        if (l.trim() === '') {
          if (buf.trim()) { parts.push(textToHTML(buf.trim())); buf = ''; }
        } else {
          buf += (buf ? ' ' : '') + l;
        }
      }
      if (buf.trim()) parts.push(textToHTML(buf.trim()));
      html += parts.join('<br>');
    }
  }
  return html;
}

// ─── Build questionText từ câu hỏi + options ────────────────────────────────

function buildQuestionText(questionRaw, options) {
  let html = rawToHTML(questionRaw);
  if (html && !html.endsWith('<br>') && !html.endsWith('>')) html += '<br>';
  else if (html && html.endsWith('</pre>')) html += '';

  for (const opt of options) {
    html += textToHTML(opt) + '<br>';
  }
  return html;
}

// ─── Parse correct answer ────────────────────────────────────────────────────

function extractCorrectAnswer(line) {
  line = line.trim();

  const multiViRe = /([A-D])\s*(?:và|and|,)\s*([A-D])(?:\s*(?:và|and|,)\s*([A-D]))?/i;
  const mMulti = line.match(multiViRe);
  if (mMulti) {
    let ans = mMulti[1].toUpperCase() + mMulti[2].toUpperCase();
    if (mMulti[3]) ans += mMulti[3].toUpperCase();
    return ans;
  }

  const mConcat = line.match(/^([A-D]{2,4})\b/i);
  if (mConcat) return mConcat[1].toUpperCase();

  const mSingle = line.match(/^([A-D])[.\s:]/i);
  if (mSingle) return mSingle[1].toUpperCase();

  const mLetter = line.match(/^([A-D])$/i);
  if (mLetter) return mLetter[1].toUpperCase();

  if (/^(true|đúng)$/i.test(line)) return 'True';
  if (/^(false|sai)$/i.test(line)) return 'False';

  return line.split(/[.,:]/)[0].trim().toUpperCase() || line;
}

// ─── MAIN PARSER (định dạng chuẩn: "Câu N", "Đáp án:", v.v.) ────────────────

function parseQuizText(text) {
  const defaultTags = document.getElementById('defaultTags').value.trim() || 'general';
  const flashcard    = document.getElementById('flashcard').checked;
  const defaultType  = document.getElementById('defaultType').value.trim() || 'multiple_choice';

  const lines = text.split('\n');
  const totalLines = lines.length;
  const questions = [];

  // Regex dùng chung — đã thêm "Đáp án" (không chỉ "Đáp án đúng")
  const ANSWER_LABEL_RE = /^(Đáp án đúng|Đáp án|Correct Answer|Answer)\s*:/i;
  const ANSWER_STRIP_RE = /^(Đáp án đúng|Đáp án|Correct Answer|Answer)\s*:\s*/i;

  let i = 0;

  function isQuestionStart(l) {
    return /^Câu\s+\d+/i.test(l) || /^Question\s+\d+/i.test(l);
  }

  function readBlock(startIdx) {
    const firstLine = lines[startIdx];
    if (!firstLine.startsWith('```')) {
      return { consumed: 1, raw: firstLine };
    }
    let raw = firstLine + '\n';
    let j = startIdx + 1;
    while (j < totalLines) {
      raw += lines[j] + '\n';
      if (lines[j].trim() === '```' || lines[j].trim().startsWith('```') && j > startIdx) {
        if (lines[j].trim() === '```' && j > startIdx) {
          j++;
          break;
        }
        if (lines[j].trimStart() === '```' && j > startIdx) {
          j++;
          break;
        }
      }
      j++;
    }
    return { consumed: j - startIdx, raw: raw.trimEnd() };
  }

  while (i < totalLines) {
    const line = lines[i].trim();
    if (!isQuestionStart(line)) { i++; continue; }

    let questionRaw   = '';
    let options       = [];
    let correctAnswer = '';
    let explanationRaw = '';
    let tags          = defaultTags;
    let questionType  = defaultType;

    // Xử lý trường hợp đề bài nằm cùng dòng với "Câu N:" (ví dụ: "Câu 4: Các công ty có thể...")
    const sameLineMatch = line.match(/^(?:Câu|Question)\s+\d+\s*:\s*(.+)$/i);
    if (sameLineMatch && sameLineMatch[1].trim()) {
      questionRaw = sameLineMatch[1].trim();
    }

    i++;

    while (i < totalLines) {
      const rawLine = lines[i];
      const l = rawLine.trim();

      if (isQuestionStart(l)) break;

      if (!l || /^_{3,}$/.test(l) || /^-{3,}$/.test(l)) { i++; continue; }

      if (/^(Đề bài|Câu hỏi)\s*:/i.test(l)) {
        questionRaw = l.replace(/^(Đề bài|Câu hỏi)\s*:\s*/i, '').trim();
        i++;
        while (i < totalLines) {
          const nl = lines[i].trim();
          if (/^(Các lựa chọn|Options|Choices)\s*:/i.test(nl)) break;
          if (/^[A-D]\.\s+/i.test(nl)) break;
          if (ANSWER_LABEL_RE.test(nl)) break;
          if (/^(Giải thích|Explanation)\s*:/i.test(nl)) break;
          if (/^Tags?\s*:/i.test(nl)) break;
          if (isQuestionStart(nl)) break;

          if (lines[i].trim().startsWith('```')) {
            const block = readBlock(i);
            questionRaw += '\n' + block.raw;
            i += block.consumed;
          } else {
            if (nl) questionRaw += '\n' + nl;
            i++;
          }
        }
        continue;
      }

      if (/^(Các lựa chọn|Options|Choices)\s*:/i.test(l)) { i++; continue; }

      if (/^[A-D]\.\s+/i.test(l)) {
        // Tách trường hợp đáp án bị dính ngay sau lựa chọn cuối cùng, ví dụ:
        // "D. ... không cần tuân thủ. Đáp án: C."
        let optLine = l;
        let inlineAnswer = null;
        const inlineMatch = optLine.match(/^(.*?)[.\s]+(Đáp án đúng|Đáp án|Correct Answer|Answer)\s*:\s*(.+)$/i);
        if (inlineMatch) {
          optLine = inlineMatch[1].trim();
          inlineAnswer = inlineMatch[3].trim();
        }

        let optText = optLine;
        i++;
        while (i < totalLines) {
          const nl = lines[i].trim();
          if (!nl) break;
          if (/^[A-D]\.\s+/i.test(nl)) break;
          if (ANSWER_LABEL_RE.test(nl)) break;
          if (/^(Giải thích|Explanation|Tags?)\s*:/i.test(nl)) break;
          if (isQuestionStart(nl)) break;
          if (lines[i].trim().startsWith('```')) break;
          optText += ' ' + nl;
          i++;
        }
        options.push(optText);

        if (inlineAnswer) {
          correctAnswer = extractCorrectAnswer(inlineAnswer);
        }
        continue;
      }

      if (ANSWER_LABEL_RE.test(l)) {
        const raw = l.replace(ANSWER_STRIP_RE, '').trim();
        correctAnswer = extractCorrectAnswer(raw);
        i++;
        continue;
      }

      if (/^(Giải thích|Explanation)\s*:/i.test(l)) {
        explanationRaw = l.replace(/^(Giải thích|Explanation)\s*:\s*/i, '').trim();
        i++;
        while (i < totalLines) {
          const nl = lines[i].trim();
          if (isQuestionStart(nl)) break;
          if (/^Tags?\s*:/i.test(nl)) break;
          if (/^(Loại câu hỏi|Type)\s*:/i.test(nl)) break;
          if (/^[A-D]\.\s+/.test(nl) && !explanationRaw) break;

          if (lines[i].trim().startsWith('```')) {
            const block = readBlock(i);
            explanationRaw += '\n' + block.raw;
            i += block.consumed;
          } else {
            if (nl) explanationRaw += '\n' + nl;
            else if (explanationRaw) explanationRaw += '\n';
            i++;
          }
        }
        continue;
      }

      if (/^Tags?\s*:/i.test(l)) {
        tags = l.replace(/^Tags?\s*:\s*/i, '').trim();
        i++;
        continue;
      }

      if (/^(Loại câu hỏi|Type)\s*:/i.test(l)) {
        questionType = l.replace(/^(Loại câu hỏi|Type)\s*:\s*/i, '').trim();
        i++;
        continue;
      }

      if (!questionRaw && !options.length && !correctAnswer && l.length > 3) {
        questionRaw = l;
        i++;
        while (i < totalLines) {
          const nl = lines[i].trim();
          if (!nl) break;
          if (/^[A-D]\.\s+/i.test(nl)) break;
          if (/^(Đáp án|Answer)/i.test(nl)) break;
          if (isQuestionStart(nl)) break;
          if (lines[i].trim().startsWith('```')) {
            const block = readBlock(i);
            questionRaw += '\n' + block.raw;
            i += block.consumed;
          } else {
            questionRaw += '\n' + nl;
            i++;
          }
        }
        continue;
      }

      i++;
    }

    if (!questionRaw && options.length === 0 && !correctAnswer) continue;

    let finalType = questionType;
    if (finalType === defaultType && /^(true|false|đúng|sai)$/i.test(correctAnswer)) {
      finalType = 'true_false';
    }

    const obj = {
      questionText: buildQuestionText(questionRaw, options),
      questionType: finalType,
      correctAnswer: correctAnswer,
      explanation: rawToHTML(explanationRaw),
      tags: tags
    };
    if (flashcard) obj.isAvailableFlashcard = true;
    questions.push(obj);
  }

  return questions;
}

// ─── PARSER MỚI: định dạng "--- Card N ---" / "Q:" / "A." / "A:" ───────────
// Ví dụ:
// --- Card 0 ---
// Q: A bond is issued at par value when:
// A. The bond pays no interest.
// B. The bond is not between interest payment dates.
// ...
// A: D. The market rate of interest is the same as the contract rate of interest.
//
// Output tối giản chỉ gồm: questionText, correctAnswer (và isAvailableFlashcard nếu bật).

function parseCardFormatText(text) {
  const flashcard = document.getElementById('flashcard').checked;
  const lines = text.split('\n');
  const totalLines = lines.length;
  const questions = [];
  let i = 0;

  function isCardStart(l) {
    return /^-{2,}\s*Card\s+\d+\s*-{2,}$/i.test(l.trim());
  }
  // Lựa chọn A-E dạng "A. ..." (chỉ chấp nhận dấu chấm, để không nhầm với "A:" là nhãn đáp án)
  function isOptionLine(l) {
    return /^[A-E]\.\s+/.test(l);
  }
  // Nhãn đáp án: dòng bắt đầu bằng "A:" (chữ A viết hoa, theo sau là dấu hai chấm)
  function isAnswerLabel(l) {
    return /^A\s*:/.test(l);
  }

  while (i < totalLines) {
    const line = lines[i].trim();
    if (!isCardStart(line)) { i++; continue; }
    i++; // bỏ qua dòng "--- Card N ---"

    let questionRaw   = '';
    let options       = [];
    let correctAnswer = '';

    while (i < totalLines) {
      const l = lines[i].trim();

      if (isCardStart(l)) break;
      if (!l) { i++; continue; }

      // Dòng câu hỏi "Q: ..."
      if (/^Q\s*:/i.test(l)) {
        questionRaw = l.replace(/^Q\s*:\s*/i, '').trim();
        i++;
        while (i < totalLines) {
          const nl = lines[i].trim();
          if (!nl) { i++; continue; }
          if (isOptionLine(nl)) break;
          if (isAnswerLabel(nl)) break;
          if (isCardStart(nl)) break;
          if (lines[i].trim().startsWith('```')) {
            let block = lines[i] + '\n';
            let j = i + 1;
            while (j < totalLines && lines[j].trim() !== '```') { block += lines[j] + '\n'; j++; }
            if (j < totalLines) { block += lines[j]; j++; }
            questionRaw += '\n' + block;
            i = j;
          } else {
            questionRaw += '\n' + nl;
            i++;
          }
        }
        continue;
      }

      // Dòng lựa chọn "A. ..." đến "E. ..."
      if (isOptionLine(l)) {
        let optText = l;
        i++;
        while (i < totalLines) {
          const nl = lines[i].trim();
          if (!nl) break;
          if (isOptionLine(nl)) break;
          if (isAnswerLabel(nl)) break;
          if (isCardStart(nl)) break;
          optText += ' ' + nl;
          i++;
        }
        options.push(optText);
        continue;
      }

      // Dòng đáp án "A: D. ..." → chỉ lấy chữ cái đáp án đúng
      if (isAnswerLabel(l)) {
        const ansRaw = l.replace(/^A\s*:\s*/i, '').trim();
        const m = ansRaw.match(/^([A-E])\b/i);
        correctAnswer = m ? m[1].toUpperCase() : extractCorrectAnswer(ansRaw);
        i++;
        continue;
      }

      i++;
    }

    if (!questionRaw && options.length === 0 && !correctAnswer) continue;

    const obj = {
      questionText: buildQuestionText(questionRaw, options),
      correctAnswer: correctAnswer
    };
    if (flashcard) obj.isAvailableFlashcard = true;
    questions.push(obj);
  }

  return questions;
}

// ─── Nhận diện định dạng đầu vào ─────────────────────────────────────────────

function detectFormat(text) {
  const mode = document.getElementById('formatMode').value;
  if (mode !== 'auto') return mode;
  // Nếu có dòng "--- Card N ---" thì coi là định dạng Card, ngược lại dùng chuẩn
  return /^-{2,}\s*Card\s+\d+\s*-{2,}\s*$/im.test(text) ? 'card' : 'standard';
}

// ─── Output rendering ────────────────────────────────────────────────────────

function escapeForDisplay(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function syntaxHighlight(json) {
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    (m) => {
      if (/^"/.test(m)) {
        if (/:$/.test(m)) return `<span class="json-key">${m}</span>`;
        return `<span class="json-str">${m}</span>`;
      }
      if (/true|false/.test(m)) return `<span class="json-bool">${m}</span>`;
      if (/null/.test(m)) return `<span class="json-null">${m}</span>`;
      return `<span class="json-num">${m}</span>`;
    }
  );
}

function convert() {
  const text = inputEl.value.trim();
  if (!text) { showToast('⚠️ Chưa có nội dung để chuyển đổi'); return; }

  const format = detectFormat(text);

  const start = performance.now();
  let questions = [], error = null;
  try {
    questions = format === 'card' ? parseCardFormatText(text) : parseQuizText(text);
  } catch(e) { error = e; }
  const elapsed = (performance.now() - start).toFixed(1);

  if (error) {
    outputEl.className = 'output-area';
    outputEl.innerHTML = `<span style="color:var(--red)">❌ Lỗi parser: ${escapeForDisplay(error.message)}\n\n${escapeForDisplay(error.stack||'')}</span>`;
    document.getElementById('resultBadge').innerHTML = `<span class="badge err">Lỗi</span>`;
    return;
  }

  parsedJSON = questions;
  const jsonStr = JSON.stringify(questions, null, 2);
  const fmtLabel = format === 'card' ? 'Card' : 'Chuẩn';

  if (questions.length === 0) {
    outputEl.className = 'output-area empty';
    outputEl.innerHTML = format === 'card'
      ? `<div><p>⚠️ Không tìm thấy câu hỏi nào.</p><p class="empty-hint" style="margin-top:8px">Mỗi câu cần bắt đầu bằng <strong>--- Card N ---</strong> kèm dòng <strong>Q:</strong> và dòng đáp án <strong>A:</strong>.</p></div>`
      : `<div><p>⚠️ Không tìm thấy câu hỏi nào.</p><p class="empty-hint" style="margin-top:8px">Mỗi câu cần bắt đầu bằng <strong>Câu N</strong> hoặc <strong>Question N</strong>.</p></div>`;
    document.getElementById('resultBadge').innerHTML = `<span class="badge warn">0 câu</span> <span class="badge fmt">${fmtLabel}</span>`;
    document.getElementById('outputStats').textContent = '—';
    document.getElementById('parseInfo').textContent = '';
    return;
  }

  outputEl.className = 'output-area';
  outputEl.innerHTML = syntaxHighlight(escapeForDisplay(jsonStr));
  outputEl.scrollTop = 0;

  const multi = questions.filter(q => (q.correctAnswer||'').length > 1).length;
  const empty = questions.filter(q => !q.correctAnswer).length;
  const hasCode = questions.filter(q => (q.questionText||'').includes('<pre>') || (q.explanation||'').includes('<pre>')).length;
  document.getElementById('resultBadge').innerHTML = (empty > 0
    ? `<span class="badge warn">✓ ${questions.length} câu (${empty} thiếu đáp án)</span>`
    : `<span class="badge ok">✓ ${questions.length} câu</span>`) + ` <span class="badge fmt">${fmtLabel}</span>`;
  document.getElementById('outputStats').textContent = `${questions.length} câu · ${(jsonStr.length/1024).toFixed(1)} KB`;
  document.getElementById('parseInfo').textContent =
    `${multi} câu nhiều đáp án${hasCode ? ` · ${hasCode} câu có code` : ''}${empty ? ` · ⚠️ ${empty} thiếu đáp án` : ''} · ${elapsed}ms`;
  showToast(`✅ Đã chuyển ${questions.length} câu thành công (định dạng: ${fmtLabel})`);
}
